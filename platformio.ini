[platformio]
src_dir = firmware/src

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

lib_deps =
    lvgl/lvgl@^9.2.0
    bodmer/TFT_eSPI@^2.5.43

build_flags =
    -DLV_CONF_SKIP=1
    -DLV_COLOR_DEPTH=16
    -DLV_COLOR_16_SWAP=1
    -DLV_MEM_SIZE=49152
    -DLV_FONT_MONTSERRAT_12=1
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_24=1
    -DLV_USE_LOG=0
    -DLV_USE_LABEL=1
    -DLV_USE_LINE=1
    -DLV_USE_IMG=1
    -DLV_USE_ARC=1
    -DLV_USE_BAR=1
    -DLV_USE_BTN=1
    -DLV_USE_BTNMATRIX=1
    -DLV_USE_CANVAS=1
    -DLV_USE_CHECKBOX=1
    -DLV_USE_DROPDOWN=1
    -DLV_USE_ROLLER=1
    -DLV_USE_SLIDER=1
    -DLV_USE_SWITCH=1
    -DLV_USE_TABLE=1
    -DLV_USE_TEXTAREA=1
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=14
    -DLOAD_GLCD=1
    -DSPI_FREQUENCY=40000000
    -DUSE_HSPI_PORT=1